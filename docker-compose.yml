services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crops_inspector
      POSTGRES_USER: crops
      POSTGRES_PASSWORD: crops_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crops -d crops_inspector"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crops:crops_dev@db:5432/crops_inspector
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
